openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Calendário Operacional - Farmácia Hospitalar
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Calendar event operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all calendar events
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
          description: ISO date string for range start
        - name: end
          in: query
          required: false
          schema:
            type: string
          description: ISO date string for range end
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by event category
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Bad request
  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Event not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an existing event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Event not found
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted
        "404":
          description: Event not found
  /events/summary:
    get:
      operationId: getEventsSummary
      tags: [events]
      summary: Get event counts grouped by category for current month
      responses:
        "200":
          description: Summary by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CalendarEvent:
      type: object
      required: [id, title, category, start, allDay, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
          enum: [ferias, folga, afastamento, troca_plantao, treinamento]
        description:
          type: ["string", "null"]
        employeeName:
          type: ["string", "null"]
        start:
          type: string
          description: ISO 8601 date or datetime
        end:
          type: ["string", "null"]
          description: ISO 8601 date or datetime
        allDay:
          type: boolean
        createdAt:
          type: string
    CalendarEventInput:
      type: object
      required: [title, category, start, allDay]
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          enum: [ferias, folga, afastamento, troca_plantao, treinamento]
        description:
          type: string
        employeeName:
          type: string
        start:
          type: string
        end:
          type: string
        allDay:
          type: boolean
    CalendarEventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          enum: [ferias, folga, afastamento, troca_plantao, treinamento]
        description:
          type: string
        employeeName:
          type: string
        start:
          type: string
        end:
          type: string
        allDay:
          type: boolean
    EventsSummary:
      type: object
      required: [total, byCategory]
      properties:
        total:
          type: integer
        byCategory:
          type: object
          properties:
            ferias:
              type: integer
            folga:
              type: integer
            afastamento:
              type: integer
            troca_plantao:
              type: integer
            treinamento:
              type: integer
