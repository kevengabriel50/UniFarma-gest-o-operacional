openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Calendário Operacional - Farmácia Hospitalar
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Calendar event operations
  - name: medications
    description: Medication master data
  - name: dom
    description: DOM (Atendimento Domiciliar) operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all calendar events
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: string
        - name: end
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new calendar event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Bad request
  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Event not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an existing event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Event not found
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Event deleted
        "404":
          description: Event not found
  /events/summary:
    get:
      operationId: getEventsSummary
      tags: [events]
      summary: Get event counts grouped by category
      responses:
        "200":
          description: Summary by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsSummary"

  /medications:
    get:
      operationId: listMedications
      tags: [medications]
      summary: List medications, optionally filtered by search query
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search by name, barcode, internal code, or manufacturer
      responses:
        "200":
          description: List of medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"
    post:
      operationId: createMedication
      tags: [medications]
      summary: Create a new medication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationInput"
      responses:
        "201":
          description: Created medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "400":
          description: Bad request
        "409":
          description: Duplicate barcode or internal code
  /medications/barcode/{codigoBarras}:
    get:
      operationId: getMedicationByBarcode
      tags: [medications]
      summary: Look up a medication by barcode
      parameters:
        - name: codigoBarras
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Medication found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Not found
  /medications/{id}:
    patch:
      operationId: updateMedication
      tags: [medications]
      summary: Update a medication (edit or inactivate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationUpdate"
      responses:
        "200":
          description: Updated medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Not found

  /dom/atendimentos:
    get:
      operationId: listDomAtendimentos
      tags: [dom]
      summary: List all DOM atendimentos
      responses:
        "200":
          description: List of atendimentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DomAtendimento"
    post:
      operationId: createDomAtendimento
      tags: [dom]
      summary: Start a new DOM atendimento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomAtendimentoInput"
      responses:
        "201":
          description: Created atendimento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomAtendimento"
        "400":
          description: Bad request
  /dom/atendimentos/{id}:
    get:
      operationId: getDomAtendimento
      tags: [dom]
      summary: Get a DOM atendimento with its items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Atendimento with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomAtendimentoDetail"
        "404":
          description: Not found
    put:
      operationId: updateDomAtendimento
      tags: [dom]
      summary: Update a DOM atendimento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomAtendimentoInput"
      responses:
        "200":
          description: Updated atendimento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomAtendimento"
        "400":
          description: Bad request
        "404":
          description: Not found
    delete:
      operationId: deleteDomAtendimento
      tags: [dom]
      summary: Delete a DOM atendimento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /dom/atendimentos/{id}/finalizar:
    patch:
      operationId: finalizeDomAtendimento
      tags: [dom]
      summary: Finalize a DOM atendimento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Finalized atendimento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomAtendimento"
        "404":
          description: Not found
  /dom/atendimentos/{id}/itens:
    post:
      operationId: addDomItem
      tags: [dom]
      summary: Add an item to a DOM atendimento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomItemInput"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomItem"
        "400":
          description: Bad request
  /dom/atendimentos/{atendimentoId}/itens/{itemId}:
    delete:
      operationId: deleteDomItem
      tags: [dom]
      summary: Remove an item from a DOM atendimento
      parameters:
        - name: atendimentoId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    CalendarEvent:
      type: object
      required: [id, title, category, start, allDay, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
          enum: [ferias, folga, afastamento, troca_plantao, treinamento]
        description:
          type: ["string", "null"]
        employeeName:
          type: ["string", "null"]
        start:
          type: string
        end:
          type: ["string", "null"]
        allDay:
          type: boolean
        createdAt:
          type: string
    CalendarEventInput:
      type: object
      required: [title, category, start, allDay]
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          enum: [ferias, folga, afastamento, troca_plantao, treinamento]
        description:
          type: string
        employeeName:
          type: string
        start:
          type: string
        end:
          type: string
        allDay:
          type: boolean
    CalendarEventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          enum: [ferias, folga, afastamento, troca_plantao, treinamento]
        description:
          type: string
        employeeName:
          type: string
        start:
          type: string
        end:
          type: string
        allDay:
          type: boolean
    EventsSummary:
      type: object
      required: [total, byCategory]
      properties:
        total:
          type: integer
        byCategory:
          type: object
          properties:
            ferias:
              type: integer
            folga:
              type: integer
            afastamento:
              type: integer
            troca_plantao:
              type: integer
            treinamento:
              type: integer

    Medication:
      type: object
      required: [id, codigoBarras, codigoInterno, nome, estoque, ativo, createdAt, updatedAt]
      properties:
        id:
          type: integer
        codigoBarras:
          type: string
        codigoInterno:
          type: string
        nome:
          type: string
        apresentacao:
          type: ["string", "null"]
        laboratorio:
          type: ["string", "null"]
        descricao:
          type: ["string", "null"]
        estoque:
          type: integer
        ativo:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
    MedicationInput:
      type: object
      required: [codigoBarras, codigoInterno, nome, estoque]
      properties:
        codigoBarras:
          type: string
          minLength: 1
        codigoInterno:
          type: string
          minLength: 1
        nome:
          type: string
          minLength: 1
        apresentacao:
          type: string
        laboratorio:
          type: string
        descricao:
          type: string
        estoque:
          type: integer
          minimum: 0
        ativo:
          type: boolean
    MedicationUpdate:
      type: object
      properties:
        codigoBarras:
          type: string
        codigoInterno:
          type: string
        nome:
          type: string
        apresentacao:
          type: string
        laboratorio:
          type: string
        descricao:
          type: string
        estoque:
          type: integer
          minimum: 0
        ativo:
          type: boolean

    DomAtendimento:
      type: object
      required: [id, nomePaciente, numeroAtendimento, data, status, createdAt]
      properties:
        id:
          type: integer
        nomePaciente:
          type: string
        numeroAtendimento:
          type: string
        data:
          type: string
        observacoes:
          type: ["string", "null"]
        status:
          type: string
          enum: [em_andamento, finalizado]
        createdAt:
          type: string
    DomAtendimentoInput:
      type: object
      required: [nomePaciente, numeroAtendimento, data]
      properties:
        nomePaciente:
          type: string
          minLength: 1
        numeroAtendimento:
          type: string
          minLength: 1
        data:
          type: string
          minLength: 1
        observacoes:
          type: string
        status:
          type: string
          enum: [em_andamento, finalizado]
    DomAtendimentoDetail:
      allOf:
        - $ref: "#/components/schemas/DomAtendimento"
        - type: object
          required: [itens]
          properties:
            itens:
              type: array
              items:
                $ref: "#/components/schemas/DomItem"
    DomItem:
      type: object
      required: [id, atendimentoId, codigoBarras, codigoInterno, nome, lote, quantidade, createdAt]
      properties:
        id:
          type: integer
        atendimentoId:
          type: integer
        codigoBarras:
          type: string
        codigoInterno:
          type: string
        nome:
          type: string
        lote:
          type: string
        quantidade:
          type: integer
        createdAt:
          type: string
    DomItemInput:
      type: object
      required: [codigoBarras, codigoInterno, nome, lote, quantidade]
      properties:
        codigoBarras:
          type: string
          minLength: 1
        codigoInterno:
          type: string
          minLength: 1
        nome:
          type: string
          minLength: 1
        lote:
          type: string
          minLength: 1
        quantidade:
          type: integer
          minimum: 1
