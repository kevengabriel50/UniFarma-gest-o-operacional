kind = "web"
previewPath = "/"
title = "Calendário Operacional - Farmácia Hospitalar"
version = "1.0.0"
id = "artifacts/pharma-calendar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18216

[services.development]
run = "pnpm --filter @workspace/pharma-calendar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pharma-calendar", "run", "build" ]
publicDir = "artifacts/pharma-calendar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18216"
BASE_PATH = "/"
